<!DOCTYPE html>

<head>

  <head><title>Philmore K.</title></head>
  <style>
    body {
      margin: 0;
      font-family: monospace;
      background: #000000;
      color: #ffffff;

    ::selection {
      background-color: #add8e6;
      color: #000000;
    }

      padding: 0 8px;
    }
    .text1 span ::selection {
      background: #000000;
      color: #00ff00;
    }
    .description {
      line-height: 36px;
      font-size: 27px;
      margin: 18px 0;
    }
    .url-wrap {

    }
    .url-container {
      margin-right: 50px;
    }
    .list-entry {

    }

    }
    .list-entry, .contact {

</head>
